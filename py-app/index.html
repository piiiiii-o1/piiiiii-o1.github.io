<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>秒読み上げツール - Web版 (Pyodide)</title>
  <style>
    body { font-family: 'メイリオ', Meiryo, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; text-align: center; }
    h1 { color: #333; margin-bottom: 20px; }
    #status { font-size: 1.3em; margin: 10px 0; font-weight: bold; }
    .running { color: green; }
    .stopped { color: red; }
    button { font-size: 1.2em; padding: 12px 30px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; color: white; }
    #startBtn { background: #28a745; }
    #startBtn:hover { background: #218838; }
    #stopBtn { background: #dc3545; }
    #stopBtn:hover { background: #c82333; }
    #log { background: white; border: 1px solid #ccc; border-radius: 6px; height: 250px; overflow-y: auto; padding: 15px; text-align: left; font-family: Consolas, monospace; white-space: pre-wrap; margin-top: 20px; }
    #loading { font-size: 1.1em; color: #666; margin: 20px 0; }
    #error { color: red; font-weight: bold; margin: 10px 0; }
  </style>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
</head>
<body>
  <h1>秒読み上げツール - Web版</h1>
  <p id="loading">Pyodideを読み込み中... 初回は数秒〜10秒かかります（ネットワーク状況により時間がかかる場合あり）</p>
  <div id="error"></div>

  <div id="status" class="stopped">停止中</div>

  <button id="startBtn" disabled>ON（開始）</button>
  <button id="stopBtn" disabled>OFF（停止）</button>

  <div id="log">発声ログがここに表示されます\n</div>

  <script type="text/javascript">
    let pyodide = null;
    let intervalId = null;
    let isRunning = false;
    const synth = window.speechSynthesis || { speak: () => console.log("SpeechSynthesis not supported") };
    const logDiv = document.getElementById('log');
    const statusDiv = document.getElementById('status');
    const loadingP = document.getElementById('loading');
    const errorDiv = document.getElementById('error');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');

    // 設定オブジェクト（あなたのcustom_settingsをJSに変換）
    const customSettings = {
      0:  ["ゼロ",               1.8],
      10: ["じゅう秒",           1.5],
      20: ["にじゅう秒",         1.5],
      30: ["さんじゅう秒",       1.5],
      40: ["よんじゅう秒",       1.5],
      50: ["ごじゅう秒、いち",   2.0],
      52: ["に",                 2.5],
      53: ["さん",               2.5],
      54: ["よん",               2.5],
      55: ["ご",                 2.5],
      56: ["ろく",               2.5],
      57: ["なな",               2.5],
      58: ["はち",               2.5],
      59: ["きゅう",             2.5],
    };

    async function initPyodide() {
      try {
        loadingP.textContent = "Pyodideを読み込み中... (ネットワーク状況により時間がかかる場合あり)";
        pyodide = await loadPyodide();
        loadingP.style.display = 'none';
        startBtn.disabled = false;
        addLog("Pyodideの初期化が完了しました！ 開始ボタンを押せます");
      } catch (err) {
        loadingP.textContent = "";
        errorDiv.textContent = "Pyodide読み込みエラー: " + err.message + "。ページをリロードするか、ネットワークを確認してください。";
        console.error("Pyodide load error:", err);
        startBtn.disabled = true;
      }
    }

    function addLog(message) {
      const now = new Date().toLocaleTimeString('ja-JP');
      logDiv.textContent += now + " → " + message + "\n";
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function speak(text, rate) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ja-JP';
      utterance.rate = rate;
      utterance.volume = 1.0;
      synth.speak(utterance);
    }

    function checkAndSpeak() {
      const now = new Date();
      const sec = now.getSeconds();

      if (sec in customSettings) {
        const [text, rate] = customSettings[sec];
        speak(text, rate);
        addLog(sec.toString().padStart(2, '0') + "秒 → " + text + " (rate=" + rate + ")");
      }
    }

    startBtn.addEventListener('click', async () => {
      if (isRunning) return;

      if (!pyodide) {
        await initPyodide();
        if (!pyodide) return;
      }

      isRunning = true;
      statusDiv.textContent = "実行中";
      statusDiv.className = "running";
      startBtn.disabled = true;
      stopBtn.disabled = false;

      addLog("開始しました");

      checkAndSpeak(); // 即時チェック
      intervalId = setInterval(checkAndSpeak, 1000);
    });

    stopBtn.addEventListener('click', () => {
      if (!isRunning) return;

      clearInterval(intervalId);
      isRunning = false;
      statusDiv.textContent = "停止中";
      statusDiv.className = "stopped";
      startBtn.disabled = false;
      stopBtn.disabled = true;

      addLog("停止しました");
    });

    // ページロード時に自動初期化
    initPyodide();
  </script>
</body>
</html>
